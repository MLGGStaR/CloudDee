# Define each YouTube channel. The pipeline produces `videos_per_run` videos
# per enabled channel per run.
#
# CURRENT MODE: one channel (Final Approach), 3 long-form + 3 shorts per day.
# Re-enable the others below when you want to fan out.

channels:

  - slug: final-approach
    name: "Final Approach"
    brand_name: "CloudDee"                       # what the outro CTA says ("Subscribe to CloudDee")
    enabled: true
    videos_per_run: 3                            # produce N different stories per run
    make_shorts: true                            # also cut a 9:16 short for each video
    sources: [ntsb_aviation, faa]
    niche_keywords:
      - aviation
      - flight
      - aircraft
      - pilot
      - crash
      - incident
    voice: onyx                                  # OpenAI TTS voice
    voice_speed: 0.95
    script_prompt: script_aviation
    target_minutes: 8
    intro_sting: null
    accent_color: "#0c2d48"
    # Per-scene music. Filenames in assets/music/. Falls back to music_bed.
    music_bed: artmylife-powerful-dramatic-trailer-514242.mp3
    music_by_scene_id:
      hook: artmylife-powerful-dramatic-trailer-514242.mp3
      setup: ikoliks_aj-acoustic-spring-mothers-day-music-320427.mp3
      incident: artmylife-powerful-dramatic-trailer-514242.mp3
      investigation: kontraa-water-afro-pop-music-445661.mp3
      takeaway: ikoliks_aj-acoustic-spring-mothers-day-music-320427.mp3
      outro: alec_koff-carnaval-484622.mp3
    youtube:
      category_id: "27"                          # Education
      tags: [aviation, ntsb, plane crash, aircraft incident, flight investigation]
      privacy: public

