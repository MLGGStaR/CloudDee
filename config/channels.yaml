# Channels. The only enabled one ("CloudDee") is now multi-source: it pulls
# stories from aviation, marine, federal court, DOJ press releases, and SEC
# enforcement. Each record is scripted with the prompt that fits its source.
#
# Per batch: 2 long-form videos + 5 Shorts (the 2 longs each spawn a paired
# Short, plus 3 standalone Shorts from the next-best records).

channels:

  - slug: final-approach                     # internal id — keep as-is so the existing OAuth refresh token stays valid
    name: "CloudDee"                          # display + brand
    brand_name: "CloudDee"                    # outro CTA: "Subscribe to CloudDee"
    enabled: true
    videos_per_run: 2                         # long-form videos per run
    shorts_per_run: 5                         # TOTAL shorts per run (2 paired + 3 standalone)
    make_shorts: true
    sources:
      - ntsb_aviation
      - ntsb_marine
      - courtlistener
      - doj
      - sec
    # Pick the right script tone per record source.
    prompts_by_source:
      ntsb_aviation: script_aviation
      ntsb_marine: script_aviation
      courtlistener: script_court
      doj: script_court
      sec: script_sec
    # Legacy single-prompt fallback if a record's source isn't mapped.
    script_prompt: script_court
    niche_keywords: [crash, indictment, sentenced, fraud, NTSB, SEC, DOJ, FOIA]
    voice: onyx
    voice_speed: 0.95
    target_minutes: 8
    intro_sting: null
    accent_color: "#0c2d48"
    music_bed: artmylife-powerful-dramatic-trailer-514242.mp3
    music_by_scene_id:
      hook: artmylife-powerful-dramatic-trailer-514242.mp3
      setup: ikoliks_aj-acoustic-spring-mothers-day-music-320427.mp3
      incident: artmylife-powerful-dramatic-trailer-514242.mp3
      investigation: kontraa-water-afro-pop-music-445661.mp3
      allegations: artmylife-powerful-dramatic-trailer-514242.mp3
      evidence: kontraa-water-afro-pop-music-445661.mp3
      scheme: artmylife-powerful-dramatic-trailer-514242.mp3
      tell: kontraa-water-afro-pop-music-445661.mp3
      penalty: ikoliks_aj-acoustic-spring-mothers-day-music-320427.mp3
      takeaway: ikoliks_aj-acoustic-spring-mothers-day-music-320427.mp3
      outro: alec_koff-carnaval-484622.mp3
    youtube:
      category_id: "27"
      tags: [public records, investigation, true crime, NTSB, SEC, DOJ, FOIA]
      privacy: public
