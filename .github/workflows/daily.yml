name: docket-daily

# Runs the full daily pipeline. Schedule is in UTC.
# 07:00 UTC = 02:00 ET / 23:00 PT (prev day) / 11:00 UAE. GitHub cron
# is typically delayed 0-3h, so the run lands 10:00-13:00 UAE local —
# late morning for the channel owner, with the day's US agency releases
# already settled from the prior evening.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip YouTube upload"
        required: false
        default: "false"
      longs:
        description: "Override long-form count (blank = use channel config)"
        required: false
        default: ""
      shorts:
        description: "Override total shorts count (blank = use channel config)"
        required: false
        default: ""

permissions:
  contents: write   # so we can commit the updated SQLite DB back to the repo

concurrency:
  group: docket-daily
  cancel-in-progress: false

# Opt every JavaScript action in this workflow into Node.js 24 today, instead
# of waiting for GitHub to flip the default in June 2026. Removes the daily
# "Node.js 20 deprecated" annotation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      COURTLISTENER_API_TOKEN: ${{ secrets.COURTLISTENER_API_TOKEN }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      YT_REFRESH_TOKENS_JSON: ${{ secrets.YT_REFRESH_TOKENS_JSON }}
      DOCKET_DB_PATH: state/docket.db
      DOCKET_OUTPUT_DIR: output
      DOCKET_LOG_LEVEL: INFO
      DOCKET_MAX_VIDEOS_PER_RUN: 3
      DOCKET_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
      DOCKET_OVERRIDE_LONGS: ${{ github.event.inputs.longs }}
      DOCKET_OVERRIDE_SHORTS: ${{ github.event.inputs.shorts }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Restore SQLite state from cache (faster than commit/push)
        id: cache-state
        uses: actions/cache@v4
        with:
          path: state
          key: docket-state-${{ github.run_id }}
          restore-keys: |
            docket-state-

      - name: Ensure state dir
        run: mkdir -p state output

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Ensure ffmpeg + fonts available
        # ffmpeg is pre-installed on ubuntu-latest, so we only install
        # what's missing. Previous version ran `apt-get update` every run
        # which occasionally stalled for 45+ minutes on slow Ubuntu
        # mirrors. Now we skip update entirely unless an install is
        # actually needed, and ffmpeg short-circuits since it's preinstalled.
        run: |
          set -e
          which ffmpeg || (sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg)
          dpkg -s fonts-dejavu >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends fonts-dejavu)
          ffmpeg -version | head -1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python cli.py daily

      - name: Save state to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: docket-state-${{ github.run_id }}

      # Commit the SQLite state DB + a daily heartbeat marker back to
      # the repo. Two purposes:
      #   1. Cache eviction insurance — if the GH Actions cache is
      #      evicted during a quiet stretch, the dedup state is still
      #      recoverable from the repo.
      #   2. Keeps the default branch active. GitHub disables scheduled
      #      workflows after 60 days of repo inactivity, and a daily
      #      bot commit prevents that from firing — critical during
      #      long unattended windows.
      # Only runs on the scheduled cron, not on manual dry-runs, and
      # never if there are no actual changes.
      - name: Commit state heartbeat to repo
        if: always() && github.event_name == 'schedule'
        run: |
          set -e
          mkdir -p state
          date -u +"%Y-%m-%dT%H:%M:%SZ run=${{ github.run_id }}" > state/last_run.txt
          git config user.name "docket-bot"
          git config user.email "docket-bot@users.noreply.github.com"
          git add state/last_run.txt
          [ -f state/docket.db ] && git add state/docket.db || true
          if git diff --staged --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "state: daily heartbeat $(date -u +%Y-%m-%d)" -m "[skip ci]"
            # Retry push once in case of transient network/race
            git push || (sleep 5 && git pull --rebase && git push)
          fi

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: |
            output/**/script.json
            output/**/thumbnail.png
            state/docket.db
          if-no-files-found: ignore
          retention-days: 14

      # Only on dry-run: also upload the rendered MP4s so you can review
      # them locally before publishing. We exclude this from real daily runs
      # because MP4s are big (~200MB/long) and GitHub's free artifact storage
      # is 500MB shared across the account.
      - name: Upload rendered MP4s (dry-run only)
        if: always() && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_id }}
          path: |
            output/**/*.mp4
          if-no-files-found: ignore
          retention-days: 7
